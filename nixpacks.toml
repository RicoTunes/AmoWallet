# Railway deployment config — Dockerfile-based (Rust + Node.js)
# Cache bust: v3 - 2026-02-23
# NOTE: railway.json specifies builder=DOCKERFILE so nixpacks is a fallback.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = []

[phases.install]
dependsOn = ["setup"]
cmds = ["rm -rf node_modules package-lock.json && npm install --legacy-peer-deps"]

[phases.build]
dependsOn = ["install"]
cmds = ["echo 'Build complete - v3'"]

[start]
cmd = "node crypto-wallet-app/backend/server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
RUST_HTTPS_PORT = "8443"
