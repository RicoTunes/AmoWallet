# Railway deployment config - Node.js backend ONLY
# Explicitly disable Rust detection
# Cache bust: v2 - 2026-01-22
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = []

[phases.install]
dependsOn = ["setup"]
cmds = ["rm -rf node_modules package-lock.json && npm install --legacy-peer-deps"]

[phases.build]
dependsOn = ["install"]
cmds = ["echo 'Build complete - v2'"]

[start]
cmd = "node crypto-wallet-app/backend/server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
