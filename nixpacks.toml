# Railway deployment config - Node.js backend only
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs-20_x", "npm-9_x"]

[phases.install]
dependsOn = ["setup"]
cmds = ["cd crypto-wallet-app/backend && npm install --legacy-peer-deps"]

[start]
cmd = "cd crypto-wallet-app/backend && node server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
