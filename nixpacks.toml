# Railway deployment config - Node.js backend ONLY
# Explicitly disable Rust detection
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = []

[phases.install]
dependsOn = ["setup"]
cmds = ["cd crypto-wallet-app/backend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps"]

[phases.build]
dependsOn = ["install"]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd crypto-wallet-app/backend && node server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
