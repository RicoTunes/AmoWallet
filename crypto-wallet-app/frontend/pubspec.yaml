name: crypto_wallet_pro
description: A professional multi-chain crypto wallet and trading platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # UI & Design
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Navigation & Routing
  go_router: ^16.2.5

  # HTTP & API
  dio: ^5.3.3
  retrofit: ^4.7.3
  json_annotation: ^4.8.1
  http_certificate_pinning: ^3.0.1
  
  # Security & Storage
  flutter_secure_storage: ^9.0.1
  crypto: ^3.0.3
  uuid: ^4.0.0
  encrypt: ^5.0.3
  
  # Error Handling & Logging
  logger: ^2.0.1

  # Blockchain & Crypto
  web3dart: ^2.7.3
  bip39: ^1.0.6
  pointycastle: ^3.9.1
  bip32: ^2.0.0
  bs58: ^1.0.2
  hex: ^0.2.0
  shared_preferences: ^2.3.0  # ← FIXED: Latest version
  local_auth: ^3.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4  # Modern alternative with better Android support
  clipboard: ^0.1.3
  
  # URL Launcher
  url_launcher: ^6.3.1
  
  # Notifications & Audio
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

  # Charts & Analytics
  fl_chart: ^1.1.1
  
  # Animations & Celebrations
  confetti: ^0.7.0

  # Real-time Updates
  web_socket_channel: ^3.0.3

  # Form Validation
  formz: ^0.8.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  base58check: ^2.0.0
  bitcoin_base: ^7.0.0
  blockchain_utils: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.6
  retrofit_generator: ^10.0.6
  json_serializable: ^6.7.1

  # Mocking
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/icons/
    - assets/images/

  
